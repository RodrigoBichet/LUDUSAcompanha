<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160" width="360" height="160" role="img" aria-label="LUDUS Acompanha">
  <!-- ===========================================================
       Logo LUDUS Acompanha — versão preto e branco, fundo transparente.
       Wordmark em duas linhas, mesmo estilo:
         "LUDUS"     -> Baloo 2 (arredondada), branco c/ contorno preto
         "ACOMPANHA" -> mesma fonte/estilo, menor
       O @import faz renderizar com a fonte certa no navegador;
       em editor (Figma/Illustrator) o texto fica editável (ou
       "converter em contornos" pra fechar o vetor).
       =========================================================== -->
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&amp;display=swap");
      .marca {
        font-family: "Baloo 2", "Nunito", Arial, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        stroke: #000000;
        stroke-linejoin: round;
        paint-order: stroke;
      }
      .ludus     { font-size: 76px; stroke-width: 4px; }
      .acompanha { font-size: 30px; stroke-width: 2.5px; }
    </style>
  </defs>

  <text class="marca ludus" x="20" y="82">LUDUS</text>
  <text class="marca acompanha" x="22" y="122">ACOMPANHA</text>
</svg>
